apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: portfolio-cluster
  region: us-east-1 # Change this if you prefer a different region
  version: "1.35"

managedNodeGroups:
  - name: standard-nodes
    instanceType: t3.medium
    minSize: 1
    maxSize: 2
    desiredCapacity: 1
    volumeSize: 20
    ssh:
      allow: true
      publicKeyName: eks-keypair